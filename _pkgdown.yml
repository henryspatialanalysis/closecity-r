url: https://henryspatialanalysis.github.io/closecity-r

template:
  bootstrap: 5
  bslib:
    base_font: {google: "Figtree"}
    heading_font: {google: "Merriweather"}
    code_font: {google: "Inconsolata"}
    primary: "#202a5b"

navbar:
  bg: primary
  structure:
    left: [intro, articles, reference]
    right: [search, close, github]
  components:
    intro:
      text: Get started
      href: articles/closecity.html
    articles:
      text: Tutorials
      menu:
      - text: Your first walkability map
        href: articles/first-map.html
      - text: Looking for a home
        href: articles/home-search.html
      - text: The amenity basket
        href: articles/amenity-basket.html
      - text: Competitor walksheds
        href: articles/competitor-walksheds.html
      - text: '---'
      - text: Efficient token use
        href: articles/token-use.html
    close:
      text: close.city
      href: https://close.city

reference:
- title: Client
  desc: >
    The client is an R6 object with one method per route. Build it with
    close_client(); make calls through its methods.
  contents:
  - close_client
  - CloseClient
- title: Output modes and replies
  desc: >
    Routes return tabular data by default: an sf object where geometry applies, a
    data frame otherwise. Convert a raw reply by hand, or read its fields.
  contents:
  - close_as_sf
  - close_as_df
  - close_reply
- title: Mapping
  desc: >
    Draw a client result on an interactive CARTO Positron basemap in one call.
  contents:
  - close_map
