# Build the pkgdown site and deploy it to the gh-pages branch.
on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

name: pkgdown

jobs:
  pkgdown:
    runs-on: ubuntu-latest
    concurrency:
      group: pkgdown-${{ github.event_name != 'pull_request' || github.run_id }}
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      # Set this repo secret to render live output and maps in the README and
      # vignettes. Without it, the examples are shown but not run.
      CLOSECITY_KEY: ${{ secrets.CLOSECITY_KEY }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::pkgdown, any::rmarkdown, local::.
          needs: website

      - name: Render README
        run: rmarkdown::render("README.Rmd")
        shell: Rscript {0}

      - name: Build site
        run: pkgdown::build_site_github_pages(new_process = FALSE, install = FALSE)
        shell: Rscript {0}

      - name: Deploy to GitHub pages
        if: github.event_name != 'pull_request'
        uses: JamesIves/github-pages-deploy-action@v4.5.0
        with:
          # clean: true so reference pages orphaned by the R6 refactor (the old
          # close_*() functional API) are purged from gh-pages, not left behind.
          clean: true
          branch: gh-pages
          folder: docs
