# Build the pkgdown site and publish it with the GitHub Pages deploy action, which
# purges the CDN on every deploy. The older gh-pages-branch push relied on the edge
# cache expiring on its own, so an update could sit stale for up to ten minutes.
# For this to publish, set the repository Pages source to "GitHub Actions".
on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

name: pkgdown

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Set this repo secret to render live output and maps in the README and
      # vignettes. Without it, the examples are shown but not run.
      CLOSECITY_KEY: ${{ secrets.CLOSECITY_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::pkgdown, any::rmarkdown, local::.
          needs: website

      - name: Render README
        run: rmarkdown::render("README.Rmd")
        shell: Rscript {0}

      - name: Build site
        run: pkgdown::build_site_github_pages(new_process = FALSE, install = FALSE)
        shell: Rscript {0}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
